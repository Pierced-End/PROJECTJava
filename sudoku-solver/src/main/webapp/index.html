<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver - Dancing Links</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🧩</div>
            <h1>Sudoku Solver</h1>
            <p class="subtitle">Algorithm X — Dancing Links Implementation</p>
        </header>
        
        <div class="controls">
            <button onclick="generatePuzzle()" class="btn btn-primary">🎲 New Puzzle</button>
            <button onclick="solvePuzzle()" class="btn btn-secondary">✨ Solve</button>
            <button onclick="showStepByStep()" class="btn btn-accent">📋 Step-by-Step</button>
            <button onclick="clearBoard()" class="btn btn-outline">🗑️ Clear</button>
        </div>
        
        <div class="board-wrapper">
            <div class="sudoku-board" id="sudokuBoard"></div>
        </div>
        
        <div class="steps-panel" id="stepsPanel" style="display: none;">
            <div class="steps-header">
                <h3>📝 Solution Steps</h3>
                <button onclick="closeSteps()" class="close-btn">✕</button>
            </div>
            <div class="steps-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="progress-text" id="progressText">0/0 steps</span>
            </div>
            <div class="steps-list" id="stepsList"></div>
        </div>
        
        <div class="message" id="message"></div>
    </div>
    
    <script>
        let currentPuzzle = [];
        let currentSteps = [];
        let currentStepIndex = -1;
        
        function createBoard() {
            const board = document.getElementById('sudokuBoard');
            board.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const cell = document.createElement('input');
                    cell.type = 'number';
                    cell.min = '1';
                    cell.max = '9';
                    cell.className = 'cell';
                    cell.id = `cell-${i}-${j}`;
                    cell.value = currentPuzzle[i]?.[j] || '';
                    
                    if (currentPuzzle[i]?.[j]) {
                        cell.classList.add('given');
                        cell.readOnly = true;
                    }
                    
                    cell.addEventListener('input', function(e) {
                        let value = e.target.value.replace(/[^1-9]/g, '');
                        e.target.value = value ? value.charAt(0) : '';
                    });
                    
                    cell.addEventListener('keydown', function(e) {
                        if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || 
                            e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                            e.preventDefault();
                            const [_, row, col] = this.id.split('-').map(Number);
                            let newRow = row, newCol = col;
                            
                            switch(e.key) {
                                case 'ArrowUp': newRow = Math.max(0, row - 1); break;
                                case 'ArrowDown': newRow = Math.min(8, row + 1); break;
                                case 'ArrowLeft': newCol = Math.max(0, col - 1); break;
                                case 'ArrowRight': newCol = Math.min(8, col + 1); break;
                            }
                            
                            const nextCell = document.getElementById(`cell-${newRow}-${newCol}`);
                            if (nextCell) nextCell.focus();
                        }
                    });
                    
                    board.appendChild(cell);
                }
            }
        }
        
        function getBoardState() {
            const board = [];
            for (let i = 0; i < 9; i++) {
                board[i] = [];
                for (let j = 0; j < 9; j++) {
                    const cell = document.getElementById(`cell-${i}-${j}`);
                    board[i][j] = cell.value ? parseInt(cell.value) : 0;
                }
            }
            return board;
        }
        
        function showMessage(msg, isError = false) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = msg;
            messageEl.className = 'message ' + (isError ? 'error' : 'success');
            messageEl.style.display = 'block';
            setTimeout(() => { messageEl.style.display = 'none'; }, 3000);
        }
        
        async function generatePuzzle() {
            try {
                showMessage('Generating new puzzle...');
                const response = await fetch('/sudoku/api/generate', { method: 'POST' });
                const data = await response.json();
                
                if (data.status === 'success') {
                    currentPuzzle = data.puzzle;
                    currentSteps = [];
                    currentStepIndex = -1;
                    createBoard();
                    document.getElementById('stepsPanel').style.display = 'none';
                    showMessage('✨ New puzzle generated!');
                }
            } catch (error) {
                showMessage('Error generating puzzle.', true);
                console.error(error);
            }
        }
        
        async function solvePuzzle() {
            const puzzle = getBoardState();
            
            try {
                showMessage('Solving with Dancing Links algorithm...');
                const response = await fetch('/sudoku/api/solve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ puzzle: puzzle })
                });
                const data = await response.json();
                
                if (data.solved) {
                    currentPuzzle = data.solution;
                    currentSteps = data.steps;
                    createBoard();
                    showMessage('✅ Puzzle solved successfully!');
                } else {
                    showMessage('❌ No solution exists!', true);
                }
            } catch (error) {
                showMessage('Error solving puzzle.', true);
                console.error(error);
            }
        }
        
        async function showStepByStep() {
            if (!currentSteps || currentSteps.length === 0) {
                const puzzle = getBoardState();
                
                try {
                    showMessage('Calculating solution steps...');
                    const response = await fetch('/sudoku/api/solve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ puzzle: puzzle })
                    });
                    const data = await response.json();
                    
                    if (data.solved) {
                        currentSteps = data.steps;
                        currentPuzzle = data.solution;
                    } else {
                        showMessage('Cannot generate steps - no solution exists.', true);
                        return;
                    }
                } catch (error) {
                    showMessage('Error generating steps.', true);
                    console.error(error);
                    return;
                }
            }
            
            currentStepIndex = -1;
            displayStepByStep();
        }
        
        function displayStepByStep() {
            const panel = document.getElementById('stepsPanel');
            const list = document.getElementById('stepsList');
            panel.style.display = 'block';
            list.innerHTML = '';
            
            if (currentSteps.length === 0) {
                list.innerHTML = '<div class="no-steps">No steps available</div>';
                return;
            }
            
            currentSteps.forEach((step, index) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'step-item';
                stepDiv.innerHTML = `
                    <span class="step-number">${index + 1}.</span>
                    <span class="step-detail">Place <strong>${step[2]}</strong> at Row ${step[0] + 1}, Col ${step[1] + 1}</span>
                    <span class="step-action">Apply</span>
                `;
                stepDiv.addEventListener('click', () => applyStep(index));
                list.appendChild(stepDiv);
            });
            
            updateProgress(0);
            panel.scrollIntoView({ behavior: 'smooth' });
        }
        
        function applyStep(index) {
            if (index < 0 || index >= currentSteps.length) return;
            
            const step = currentSteps[index];
            const cell = document.getElementById(`cell-${step[0]}-${step[1]}`);
            
            if (cell) {
                cell.value = step[2];
                cell.classList.add('solution-highlight');
                cell.classList.add('given');
                cell.readOnly = true;
                setTimeout(() => cell.classList.remove('solution-highlight'), 2000);
                
                currentStepIndex = index;
                updateProgress(index + 1);
                
                document.querySelectorAll('.step-item').forEach((item, i) => {
                    if (i === index) {
                        item.classList.add('active-step');
                        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        item.classList.remove('active-step');
                    }
                });
            }
        }
        
        function updateProgress(current) {
            const total = currentSteps.length;
            const percentage = (current / total) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = `${current}/${total} steps`;
        }
        
        function closeSteps() {
            document.getElementById('stepsPanel').style.display = 'none';
        }
        
        function clearBoard() {
            currentPuzzle = Array(9).fill().map(() => Array(9).fill(0));
            currentSteps = [];
            currentStepIndex = -1;
            createBoard();
            document.getElementById('stepsPanel').style.display = 'none';
            showMessage('🧹 Board cleared!');
        }
        
        window.onload = function() {
            currentPuzzle = Array(9).fill().map(() => Array(9).fill(0));
            createBoard();
            showMessage('👋 Welcome! Click "New Puzzle" to start.');
        };
    </script>
</body>
</html>

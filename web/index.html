<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver - Dancing Links</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🧩</div>
            <h1>Sudoku Solver</h1>
            <p class="subtitle">Algorithm X — Dancing Links Implementation</p>
        </header>
        
        <div class="main-content centered" id="mainContent">
            <div class="board-section" id="boardSection">
                <div class="board-wrapper">
                    <div class="sudoku-board" id="sudokuBoard"></div>
                </div>
                
                <div class="controls">
                    <button onclick="generatePuzzle()" class="btn btn-primary">🎲 New Puzzle</button>
                    <button onclick="checkSolution()" class="btn btn-accent">✅ Check</button>
                    <button onclick="showStepByStep()" class="btn btn-secondary">📋 Step-by-Step</button>
                    <button onclick="clearBoard()" class="btn btn-outline">🗑️ Clear</button>
                </div>
                
                <div class="message" id="message"></div>
            </div>
            
            <div class="steps-section" id="stepsSection">
                <div class="steps-panel" id="stepsPanel">
                    <div class="steps-header">
                        <h3>📝 Solution Steps</h3>
                        <button onclick="closeSteps()" class="close-btn">✕</button>
                    </div>
                    <div class="steps-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <span class="progress-text" id="progressText">0/0 steps</span>
                    </div>
                    <div class="steps-list" id="stepsList"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentPuzzle = [];
        let originalPuzzle = [];
        let currentSteps = [];
        let currentStepIndex = -1;
        let puzzleGenerated = false;
        
        function openPanel() {
            document.getElementById('mainContent').classList.remove('centered');
            document.getElementById('mainContent').classList.add('with-panel');
            document.getElementById('stepsSection').classList.add('visible');
        }
        
        function closePanel() {
            document.getElementById('stepsSection').classList.remove('visible');
            document.getElementById('mainContent').classList.remove('with-panel');
            document.getElementById('mainContent').classList.add('centered');
        }
        
        function createBoard() {
            const board = document.getElementById('sudokuBoard');
            board.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const cell = document.createElement('input');
                    cell.type = 'number';
                    cell.min = '1';
                    cell.max = '9';
                    cell.className = 'cell';
                    cell.id = `cell-${i}-${j}`;
                    cell.value = currentPuzzle[i]?.[j] || '';
                    
                    if (originalPuzzle[i]?.[j]) {
                        cell.classList.add('given');
                        cell.readOnly = true;
                    }
                    
                    cell.addEventListener('input', function(e) {
                        let value = e.target.value.replace(/[^1-9]/g, '');
                        e.target.value = value ? value.charAt(0) : '';
                    });
                    
                    cell.addEventListener('keydown', function(e) {
                        if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || 
                            e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                            e.preventDefault();
                            const [_, row, col] = this.id.split('-').map(Number);
                            let newRow = row, newCol = col;
                            
                            switch(e.key) {
                                case 'ArrowUp': newRow = Math.max(0, row - 1); break;
                                case 'ArrowDown': newRow = Math.min(8, row + 1); break;
                                case 'ArrowLeft': newCol = Math.max(0, col - 1); break;
                                case 'ArrowRight': newCol = Math.min(8, col + 1); break;
                            }
                            
                            const nextCell = document.getElementById(`cell-${newRow}-${newCol}`);
                            if (nextCell) nextCell.focus();
                        }
                    });
                    
                    board.appendChild(cell);
                }
            }
        }
        
        function getBoardState() {
            const board = [];
            for (let i = 0; i < 9; i++) {
                board[i] = [];
                for (let j = 0; j < 9; j++) {
                    const cell = document.getElementById(`cell-${i}-${j}`);
                    board[i][j] = cell.value ? parseInt(cell.value) : 0;
                }
            }
            return board;
        }
        
        function showMessage(msg, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = msg;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
            setTimeout(() => { messageEl.style.display = 'none'; }, 4000);
        }
        
        async function generatePuzzle() {
            try {
                showMessage('Generating new puzzle...', 'info');
                const response = await fetch('/sudoku/api/generate', { method: 'POST' });
                const data = await response.json();
                
                if (data.status === 'success') {
                    currentPuzzle = data.puzzle.map(row => [...row]);
                    originalPuzzle = data.puzzle.map(row => [...row]);
                    currentSteps = [];
                    currentStepIndex = -1;
                    puzzleGenerated = true;
                    createBoard();
                    closePanel();
                    showMessage('✨ New puzzle generated! Fill in the blanks.');
                }
            } catch (error) {
                showMessage('Error generating puzzle.', 'error');
                console.error(error);
            }
        }
        
        async function checkSolution() {
            if (!puzzleGenerated) {
                showMessage('⚠️ Generate a puzzle first!', 'error');
                return;
            }
            
            const userBoard = getBoardState();
            
            let hasEmpty = false;
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    if (userBoard[i][j] === 0) {
                        hasEmpty = true;
                        break;
                    }
                }
                if (hasEmpty) break;
            }
            
            if (hasEmpty) {
                showMessage('⚠️ Please fill in all cells first!', 'error');
                return;
            }
            
            try {
                showMessage('Checking your solution...', 'info');
                const response = await fetch('/sudoku/api/solve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ puzzle: userBoard })
                });
                const data = await response.json();
                
                if (data.solved) {
                    let isCorrect = true;
                    for (let i = 0; i < 9; i++) {
                        for (let j = 0; j < 9; j++) {
                            if (userBoard[i][j] !== data.solution[i][j]) {
                                isCorrect = false;
                                const cell = document.getElementById(`cell-${i}-${j}`);
                                if (cell && !originalPuzzle[i][j]) {
                                    cell.style.background = '#FADBD8';
                                    setTimeout(() => {
                                        cell.style.background = '';
                                    }, 3000);
                                }
                            }
                        }
                    }
                    
                    if (isCorrect) {
                        showMessage('🎉 Congratulations! Your solution is correct!', 'success');
                    } else {
                        showMessage('❌ Some numbers are incorrect. Red cells are wrong.', 'error');
                    }
                } else {
                    showMessage('❌ Invalid Sudoku! Please check your entries.', 'error');
                }
            } catch (error) {
                showMessage('Error checking solution.', 'error');
                console.error(error);
            }
        }
        
        async function showStepByStep() {
            if (!puzzleGenerated) {
                showMessage('⚠️ Generate a puzzle first!', 'error');
                return;
            }
            
            if (!currentSteps || currentSteps.length === 0) {
                const puzzle = originalPuzzle.map(row => [...row]);
                
                try {
                    showMessage('Calculating solution steps...', 'info');
                    const response = await fetch('/sudoku/api/solve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ puzzle: puzzle })
                    });
                    const data = await response.json();
                    
                    if (data.solved) {
                        // Filter out steps that are already given numbers
                        currentSteps = data.steps.filter(step => {
                            return !originalPuzzle[step[0]][step[1]];
                        });
                        currentPuzzle = puzzle.map(row => [...row]);
                        createBoard();
                    } else {
                        showMessage('Cannot generate steps - no solution exists.', 'error');
                        return;
                    }
                } catch (error) {
                    showMessage('Error generating steps.', 'error');
                    console.error(error);
                    return;
                }
            }
            
            currentStepIndex = -1;
            currentPuzzle = originalPuzzle.map(row => [...row]);
            createBoard();
            
            // Open panel with animation
            openPanel();
            displayStepByStep();
        }
        
        function displayStepByStep() {
            const list = document.getElementById('stepsList');
            list.innerHTML = '';
            
            if (currentSteps.length === 0) {
                list.innerHTML = '<div class="no-steps">No steps needed - puzzle is complete!</div>';
                return;
            }
            
            currentSteps.forEach((step, index) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'step-item';
                stepDiv.id = `step-${index}`;
                stepDiv.innerHTML = `
                    <span class="step-number">${index + 1}.</span>
                    <span class="step-detail">Place <strong>${step[2]}</strong> at Row ${step[0] + 1}, Col ${step[1] + 1}</span>
                    <span class="step-action">Apply</span>
                `;
                stepDiv.addEventListener('click', function() {
                    applyStep(index);
                });
                list.appendChild(stepDiv);
            });
            
            updateProgress(0);
        }
        
        function applyStep(index) {
            if (index < 0 || index >= currentSteps.length) return;
            
            const step = currentSteps[index];
            const cell = document.getElementById(`cell-${step[0]}-${step[1]}`);
            
            if (cell && !originalPuzzle[step[0]]?.[step[1]]) {
                cell.value = step[2];
                cell.classList.add('solution-highlight');
                setTimeout(() => cell.classList.remove('solution-highlight'), 2000);
                
                currentStepIndex = index;
                updateProgress(index + 1);
                
                document.querySelectorAll('.step-item').forEach((item, i) => {
                    if (i === index) {
                        item.classList.add('active-step');
                        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else if (i < index) {
                        item.style.opacity = '0.5';
                    } else {
                        item.classList.remove('active-step');
                        item.style.opacity = '1';
                    }
                });
            }
        }
        
        function updateProgress(current) {
            const total = currentSteps.length;
            const percentage = total > 0 ? (current / total) * 100 : 0;
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = `${current}/${total} steps`;
        }
        
        function closeSteps() {
            closePanel();
            if (originalPuzzle.length > 0) {
                currentPuzzle = originalPuzzle.map(row => [...row]);
                createBoard();
            }
        }
        
        function clearBoard() {
            if (puzzleGenerated && originalPuzzle.length > 0) {
                currentPuzzle = originalPuzzle.map(row => [...row]);
                createBoard();
                showMessage('🧹 Board reset to original puzzle.');
            } else {
                currentPuzzle = Array(9).fill().map(() => Array(9).fill(0));
                originalPuzzle = Array(9).fill().map(() => Array(9).fill(0));
                puzzleGenerated = false;
                createBoard();
                showMessage('🧹 Board cleared. Generate a new puzzle!');
            }
            currentSteps = [];
            currentStepIndex = -1;
            closePanel();
        }
        
        window.onload = function() {
            currentPuzzle = Array(9).fill().map(() => Array(9).fill(0));
            originalPuzzle = Array(9).fill().map(() => Array(9).fill(0));
            puzzleGenerated = false;
            createBoard();
            // Ensure panel is hidden on load
            closePanel();
            showMessage('👋 Welcome! Click "New Puzzle" to start.', 'info');
        };
    </script>
</body>
</html>
